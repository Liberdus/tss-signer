events {
    worker_connections 1024;
}

http {
    upstream coordinator_nodes {
        # Enable sticky sessions based on client IP
        ip_hash;
        
        # Our coordinator nodes
        server coordinator1:8000;
        server coordinator2:8000;
        server coordinator3:8000;
    }

    server {
        listen 80;
        
        location / {
            # Pass requests to the coordinator nodes
            proxy_pass http://coordinator_nodes;
            
            # Set headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support (if needed in future)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://coordinator_nodes/health;
            proxy_set_header Host $host;
            access_log off;
            
            # Cache health check results for 5 seconds
            proxy_cache_valid 200 5s;
        }
    }
}